name: Run Automation Scripts

on:
  workflow_dispatch:
    inputs:
      vault_skip_verify:
        description: 'Skip Vault SSL verification (true/false)'
        required: false
        default: 'false'
      run_diagnostics:
        description: 'Run Vault SSL Diagnostics (true/false)'
        required: false
        default: 'false'

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/horacecuiorg/dockerfile/ubuntu2204:githubrunner

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 3: Install Python dependencies
      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then
            pip3 install -r scripts/requirements.txt
          fi

      # Step 3.5: Vault SSL Diagnostics
      - name: Vault SSL Diagnostics
        if: ${{ github.event.inputs.run_diagnostics == 'true' }}
        shell: bash
        env:
          VAULT_URL: ${{ secrets.VAULT_URL }}
        run: |
          if [ -z "$VAULT_URL" ]; then
            echo "VAULT_URL is not set. Skipping diagnostics."
            exit 0
          fi
          # Extract host:port from VAULT_URL
          VAULT_HOST=$(echo "$VAULT_URL" | sed -e 's|https://||' -e 's|http://||' -e 's|/.*||')
          if [[ "$VAULT_URL" =~ https:// ]]; then
            if [[ ! "$VAULT_HOST" =~ : ]]; then
              VAULT_HOST="$VAULT_HOST:443"
            fi
          else
            if [[ ! "$VAULT_HOST" =~ : ]]; then
              VAULT_HOST="$VAULT_HOST:80"
            fi
          fi
          PURE_HOST=$(echo "$VAULT_HOST" | cut -d: -f1)
          PORT=$(echo "$VAULT_HOST" | cut -d: -f2)
          
          echo "Target Host: $PURE_HOST"
          echo "Target Port: $PORT"
          
          echo "=== DNS Resolution ==="
          python3 -c "import socket; print('Resolved IP(s):', ', '.join(set(x[4][0] for x in socket.getaddrinfo('$PURE_HOST', None))))" || echo "DNS resolution via Python failed"
          
          echo "=== SSL Connection Check ==="
          if [[ "$VAULT_URL" =~ https:// ]]; then
            openssl s_client -connect "$PURE_HOST:$PORT" -servername "$PURE_HOST" < /dev/null 2>&1 | head -n 40
            echo "=== Certificate Subject and SANs ==="
            openssl s_client -connect "$PURE_HOST:$PORT" -servername "$PURE_HOST" < /dev/null 2>/dev/null | openssl x509 -noout -text | grep -E "Subject:|DNS:" || echo "Failed to read certificate"
          else
            echo "HTTP endpoint detected, skipping SSL checks."
          fi


      # Step 4: Run Python Script (Read KV path)
      - name: Run Vault helper script (Read KV path)
        env:
          VAULT_URL: ${{ secrets.VAULT_URL }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          VAULT_SKIP_VERIFY: ${{ github.event.inputs.vault_skip_verify || 'false' }}
        run: |
          python3 scripts/read_vault.py -p /v1/kv/data/kvtest1

      # Step 5: Run Bash Script
      - name: Run Bash script
        run: |
          # Use GREET_NAME from manual dispatch if present, otherwise default to "Runner"
          GREET_NAME="${{ github.event.inputs.greet_name || 'GitHub Runner' }}"
          ./scripts/sample_bash.sh --name "$GREET_NAME"

      # Step 7: Run .NET Console Script
      - name: Run .NET Console Script
        run: |
          GREET_NAME="${{ github.event.inputs.greet_name || 'GitHub Runner' }}"
          dotnet run --project scripts/dotnet/RunnerScripts/RunnerScripts.csproj -- "$GREET_NAME"
