name: list_dns_records
on:
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/horacecuiorg/dockerfile/ubuntu2204:githubrunner

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Python dependencies
      - name: Install Python dependencies
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | sed 's/\//-/g')
          BRANCH_NAME="${{ github.ref_name }}"
          WORKFLOW_NAME=$(basename "${{ github.workflow_ref }}" | cut -d'@' -f1 | sed 's/\.ya\?ml//')
          DATETIME=$(date +'%Y%m%d_%H%M%S')
          LOG_FILENAME="${REPO_NAME}_${BRANCH_NAME}_${WORKFLOW_NAME}_${DATETIME}.log"
          
          echo "RUN_LOG=$LOG_FILENAME" >> $GITHUB_ENV
          
          echo "=== Installing Python dependencies ===" > "$LOG_FILENAME"
          python3 -m pip install --upgrade pip >> "$LOG_FILENAME" 2>&1
          if [ -f scripts/requirements.txt ]; then
            pip3 install -r scripts/requirements.txt >> "$LOG_FILENAME" 2>&1
          fi

      # Step 3: Fetch DNS Credentials from Vault
      - name: Fetch DNS Credentials from Vault
        if: always()
        env:
          VAULT_URL: ${{ secrets.VAULT_URL }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          echo "=== Fetching DNS credentials from Vault ===" >> "$RUN_LOG"
          cf_secrets=$(python3 scripts/read_vault.py -p /v1/kv/data/cf 2>> "$RUN_LOG")
          CF_DNS_API=$(echo "$cf_secrets" | python3 -c "import sys, json; print(json.load(sys.stdin).get('CF_DNS_API', ''))" 2>/dev/null)
          CF_ZONE_CS=$(echo "$cf_secrets" | python3 -c "import sys, json; print(json.load(sys.stdin).get('CF_ZONE_CS', ''))" 2>/dev/null)

          if [ -n "$CF_DNS_API" ] && [ -n "$CF_ZONE_CS" ]; then
            echo "Successfully fetched credentials from Vault." >> "$RUN_LOG"
          else
            echo "Failed to fetch credentials from Vault." >> "$RUN_LOG"
            exit 1
          fi

          echo "::add-mask::$CF_DNS_API"
          echo "::add-mask::$CF_ZONE_CS"
          echo "CF_DNS_API=$CF_DNS_API" >> $GITHUB_ENV
          echo "CF_ZONE_CS=$CF_ZONE_CS" >> $GITHUB_ENV

      # Step 4: Show list_dns_records
      - name: Show list_dns_records
        if: always()
        run: |
          echo "=== Running list_dns_records.py ===" >> "$RUN_LOG"
          python3 scripts/list_dns_records.py ${CF_DNS_API} ${CF_ZONE_CS} >> "$RUN_LOG" 2>&1

      # Step 5: Fetch Telegram Credentials from Vault
      - name: Fetch Telegram Credentials from Vault
        if: always()
        env:
          VAULT_URL: ${{ secrets.VAULT_URL }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          echo "=== Fetching Telegram credentials from Vault ===" >> "$RUN_LOG"
          github_secrets=$(python3 scripts/read_vault.py -p /v1/kv/data/github 2>> "$RUN_LOG")
          GIT_PUSH_BOT=$(echo "$github_secrets" | python3 -c "import sys, json; print(json.load(sys.stdin).get('GIT_PUSH_BOT', ''))" 2>/dev/null)
          MY_TEL_ID=$(echo "$github_secrets" | python3 -c "import sys, json; print(json.load(sys.stdin).get('MY_TEL_ID', ''))" 2>/dev/null)
          
          if [ -n "$GIT_PUSH_BOT" ] && [ -n "$MY_TEL_ID" ]; then
            echo "Successfully fetched credentials from Vault." >> "$RUN_LOG"
          else
            echo "Failed to fetch credentials from Vault." >> "$RUN_LOG"
            exit 1
          fi
          
          echo "::add-mask::$GIT_PUSH_BOT"
          echo "::add-mask::$MY_TEL_ID"
          echo "GIT_PUSH_BOT=$GIT_PUSH_BOT" >> $GITHUB_ENV
          echo "MY_TEL_ID=$MY_TEL_ID" >> $GITHUB_ENV

      # Step 6: Send log to Telegram
      - name: Send log to Telegram
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ env.GIT_PUSH_BOT }}/sendDocument" \
            -F "chat_id=${{ env.MY_TEL_ID }}" \
            -F "document=@${{ env.RUN_LOG }}" \
            -F "caption=GitHub Actions Run Log"
